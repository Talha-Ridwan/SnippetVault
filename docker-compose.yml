services:
  # ---------------------------------------------------------------------------
  # 1. TRAFFIC CONTROL LAYER (Reverse Proxy) 
  # ---------------------------------------------------------------------------
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: snippetvault_nginx
    ports:
      - "8080:80"
    depends_on:
      - frontend
      - backend
    networks:
      - snippetvault_internal

  # ---------------------------------------------------------------------------
  # 2. FRONTEND LAYER (React + Vite)
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: snippetvault_frontend
    restart: unless-stopped
    # Vite's default port is 5173
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      # Forces Vite to watch for file changes inside Docker
      - CHOKIDAR_USEPOLLING=true
    networks:
      - snippetvault_internal

  # ---------------------------------------------------------------------------
  # 3. BACKEND LAYER (Laravel API)
  # ---------------------------------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: snippetvault_backend
    restart: unless-stopped
    working_dir: /var/www
    ports:
      - "1000:8000"
    volumes:
      - ./backend:/var/www
    environment:
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: snippetvault
      DB_USERNAME: snippetuser
      DB_PASSWORD: '${DB_PASSWORD}'
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      - mysql
      - redis
    networks:
      - snippetvault_internal

  # ---------------------------------------------------------------------------
  # 4. DATA LAYER (Primary Database)
  # ---------------------------------------------------------------------------
  mysql:
    image: mysql:8.0
    container_name: snippetvault_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: snippetvault
      MYSQL_USER: snippetuser
      MYSQL_PASSWORD: '${DB_PASSWORD}'
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3306:3306"
    networks:
      - snippetvault_internal

  # ---------------------------------------------------------------------------
  # 5. CACHE LAYER (High-Speed Cache)
  # ---------------------------------------------------------------------------
  redis:
    image: redis:alpine
    container_name: snippetvault_redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - snippetvault_internal

networks:
  snippetvault_internal:
    driver: bridge

volumes:
  mysql_data:
  redis_data: